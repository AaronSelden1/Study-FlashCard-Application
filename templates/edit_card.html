{% extends "base.html" %}
{% block title %}Edit Card | Study Flashcard App{% endblock %}

{% block content %}
<div class="form-card">
  <h2>Edit Card</h2>
  <form method="POST" action="{{ url_for('edit_card', deck_id=deck.id, card_id=card.id) }}">
    <div class="form-group">
      <label for="question">Question</label>
      <textarea id="question" name="question" rows="3" required>{{ card.question }}</textarea>
    </div>
    <div class="form-group">
      <label for="answer">Answer</label>
      <textarea id="answer" name="answer" rows="3" required>{{ card.answer }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a class="btn btn-secondary" href="{{ url_for('view_deck', deck_id=deck.id) }}">Cancel</a>
  </form>
</div>
{% endblock %}
