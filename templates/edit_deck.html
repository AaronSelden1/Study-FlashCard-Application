{% extends "base.html" %}
{% block title %}Edit Deck | Study Flashcard App{% endblock %}

{% block content %}
<div class="form-card">
  <h2>Edit Deck</h2>
  <form method="POST" action="{{ url_for('edit_deck', deck_id=deck.id) }}">
    <div class="form-group">
      <label for="name">Deck Name</label>
      <input type="text" id="name" name="name" value="{{ deck.name }}" required autofocus>
    </div>
    <div class="form-group">
      <label for="description">Description (optional)</label>
      <input type="text" id="description" name="description" value="{{ deck.description or '' }}">
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a class="btn btn-secondary" href="{{ url_for('view_deck', deck_id=deck.id) }}">Cancel</a>
  </form>
</div>
{% endblock %}
